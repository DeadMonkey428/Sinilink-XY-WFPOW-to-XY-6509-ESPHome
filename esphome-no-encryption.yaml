esphome:
  name: sinilink
  friendly_name: Sinilink XY-WFPOW
  min_version: 2026.4.0
  name_add_mac_suffix: false

  # Den Verbindungsstatus an das XY-6509 melden, damit dessen
  # WiFi-Symbol auf dem Display aktualisiert wird.
  on_boot:
    priority: -100
    then:
      - delay: 2s
      - script.execute: xy6509_sync_wifi_display

esp8266:
  board: esp01_1m

# GPIO1/GPIO3 werden fuer Modbus verwendet.
logger:
  baud_rate: 0

api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  on_connect:
    - script.execute: xy6509_sync_wifi_display

  on_disconnect:
    - script.execute: xy6509_sync_wifi_display

  # Rettungs-AP, falls die Station-Verbindung nach einem OTA nicht kommt.
  # Ohne Serial-Log (UART0 = Modbus) sonst nur per Neu-Flashen erreichbar.
  ap:
    ssid: "Sinilink Fallback"
    password: !secret ap_password

captive_portal:

# Letzte aktive Grenzwerte merken, damit die optionalen Schutzfunktionen
# nach dem Ausschalten wieder mit dem letzten Wert aktiviert werden koennen.
globals:
  - id: xy6509_last_oah_ah
    type: float
    restore_value: true
    initial_value: '2.0'

  - id: xy6509_last_owh_wh
    type: float
    restore_value: true
    initial_value: '500.0'

  - id: xy6509_last_ohp_minutes
    type: float
    restore_value: true
    initial_value: '150.0'

  - id: xy6509_last_etp_c
    type: float
    restore_value: true
    initial_value: '60.0'

# ---------------------------------------------------------------------------
# WiFi-Status auf dem XY-6509-Display synchronisieren
# ---------------------------------------------------------------------------

script:
  - id: xy6509_sync_wifi_display
    mode: restart
    then:
      # Kurze Pause, damit Modbus und WiFi ihren Zustand stabilisiert haben.
      - delay: 250ms
      - if:
          condition:
            wifi.connected:
          then:
            # DEVICE 4 = nET / verbunden und im Netzwerk.
            - number.set:
                id: xy6509_device_status
                value: 4
          else:
            # DEVICE 3 = ROU / Verbindung zum Router wird aufgebaut.
            - number.set:
                id: xy6509_device_status
                value: 3

# ---------------------------------------------------------------------------
# Status-LED
# ---------------------------------------------------------------------------

output:
  - platform: gpio
    id: led
    pin:
      number: GPIO2
      inverted: true

interval:
  - interval: 1s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - output.turn_on: led
          else:
            - output.turn_off: led

# ---------------------------------------------------------------------------
# XY-6509 Modbus RTU
# ---------------------------------------------------------------------------

uart:
  id: xy6509_uart
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 115200
  data_bits: 8
  parity: NONE
  stop_bits: 1

modbus:
  id: xy6509_modbus
  uart_id: xy6509_uart
  send_wait_time: 5ms

modbus_controller:
  - id: xy6509
    address: 0x01
    modbus_id: xy6509_modbus
    command_throttle: 10ms
    update_interval: 1s
    setup_priority: -10

# ---------------------------------------------------------------------------
# Einstellbare Ausgangswerte, Alarmgrenzen und interner Schutzstatus
# ---------------------------------------------------------------------------

number:
  # Ausgangsspannung, Register 0x0000, Rohwert = V x 100
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_set_voltage
    name: "Sollspannung"
    address: 0x0000
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    icon: "mdi:sine-wave"
    mode: box
    min_value: 0.60
    max_value: 65.00
    step: 0.01
    multiply: 100

  # Strombegrenzung, Register 0x0001, Rohwert = A x 1000
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_set_current
    name: "Strombegrenzung"
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    icon: "mdi:current-dc"
    mode: box
    min_value: 0.000
    max_value: 9.200
    step: 0.001
    multiply: 1000

  # Displayhelligkeit, Register 0x0014.
  # Laut Handbuch sind die Stufen 1 bis 5 vorgesehen.
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_display_brightness
    name: "Displayhelligkeit"
    address: 0x0014
    value_type: U_WORD
    icon: "mdi:brightness-6"
    mode: slider
    min_value: 1
    max_value: 5
    step: 1
    multiply: 1
    entity_category: config

  # Kommunikations-/Modulstatus, Register 0x001E.
  # 0 = kein/ungueltiges WiFi, 1 = Touch Pair, 2 = AP Pair,
  # 3 = Router verbinden, 4 = Netzwerk verbunden.
  # Intern, weil dieser Wert automatisch aus dem ESPHome-WiFi-Status folgt.
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_device_status
    address: 0x001E
    value_type: U_WORD
    min_value: 0
    max_value: 4
    step: 1
    multiply: 1
    internal: true

  # Aktueller Schutz-/Fehlercode, Register 0x0010.
  # Das Register ist laut Protokoll les- und schreibbar. Schreiben von 0
  # quittiert den aktiven Alarm. Intern, da die Bedienung ueber den
  # separaten HA-Button "Alarm quittieren" erfolgt.
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_protection_code
    address: 0x0010
    value_type: U_WORD
    min_value: 0
    max_value: 11
    step: 1
    multiply: 1
    internal: true

  # LVP: Eingangs-Unterspannung, Register 0x0052, Rohwert = V x 100
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_lvp
    name: "Alarmgrenze Unterspannung (LVP)"
    address: 0x0052
    value_type: U_WORD
    unit_of_measurement: "V"
    icon: "mdi:flash-triangle-outline"
    mode: box
    min_value: 10.00
    max_value: 75.00
    step: 0.01
    multiply: 100
    entity_category: config

  # OVP: Ausgangs-Ueberspannung, Register 0x0053, Rohwert = V x 100
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_ovp
    name: "Alarmgrenze Überspannung (OVP)"
    address: 0x0053
    value_type: U_WORD
    unit_of_measurement: "V"
    icon: "mdi:flash-triangle"
    mode: box
    min_value: 0.00
    max_value: 67.00
    step: 0.01
    multiply: 100
    entity_category: config

  # OCP: Ausgangs-Ueberstrom, Register 0x0054, Rohwert = A x 1000
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_ocp
    name: "Alarmgrenze Überstrom (OCP)"
    address: 0x0054
    value_type: U_WORD
    unit_of_measurement: "A"
    icon: "mdi:current-dc"
    mode: box
    min_value: 0.000
    max_value: 9.200
    step: 0.001
    multiply: 1000
    entity_category: config

  # OPP: Ausgangs-Ueberleistung, Register 0x0055, Rohwert = W x 10
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_opp
    name: "Alarmgrenze Überleistung (OPP)"
    address: 0x0055
    value_type: U_WORD
    unit_of_measurement: "W"
    icon: "mdi:lightning-bolt"
    mode: box
    min_value: 0.0
    max_value: 650.0
    step: 0.1
    multiply: 10
    entity_category: config

  # OHP: Stunden, Register 0x0056
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_ohp_hours_raw
    address: 0x0056
    value_type: U_WORD
    min_value: 0
    max_value: 99
    step: 1
    multiply: 1
    internal: true

  # OHP: Minuten, Register 0x0057
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_ohp_minutes_raw
    address: 0x0057
    value_type: U_WORD
    min_value: 0
    max_value: 59
    step: 1
    multiply: 1
    internal: true

  # OHP zusammengefasst in Minuten. 0 = Schutz aus.
  - platform: template
    id: xy6509_alarm_ohp
    name: "Alarmgrenze Laufzeit (OHP)"
    unit_of_measurement: "min"
    icon: "mdi:timer-alert-outline"
    mode: box
    min_value: 0
    max_value: 5999
    step: 1
    update_interval: 1s
    entity_category: config
    lambda: |-
      if (isnan(id(xy6509_alarm_ohp_hours_raw).state) ||
          isnan(id(xy6509_alarm_ohp_minutes_raw).state)) {
        return NAN;
      }

      return id(xy6509_alarm_ohp_hours_raw).state * 60.0f
          + id(xy6509_alarm_ohp_minutes_raw).state;
    set_action:
      - number.set:
          id: xy6509_alarm_ohp_hours_raw
          value: !lambda |-
            const int total_minutes = static_cast<int>(x);
            return static_cast<float>(total_minutes / 60);
      - delay: 50ms
      - number.set:
          id: xy6509_alarm_ohp_minutes_raw
          value: !lambda |-
            const int total_minutes = static_cast<int>(x);
            return static_cast<float>(total_minutes % 60);
    on_value:
      then:
        - lambda: |-
            if (x > 0.0f &&
                fabsf(x - id(xy6509_last_ohp_minutes)) > 0.5f) {
              id(xy6509_last_ohp_minutes) = x;
            }

  # OAH: maximale Kapazitaet, Register 0x0058/0x0059,
  # Low-Word zuerst, Rohwert in mAh. 0 = Schutz aus.
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_oah
    name: "Alarmgrenze Kapazität (OAH)"
    address: 0x0058
    value_type: U_DWORD_R
    unit_of_measurement: "Ah"
    icon: "mdi:battery-alert-variant-outline"
    mode: box
    min_value: 0.000
    max_value: 9999.000
    step: 0.001
    multiply: 1000
    use_write_multiple: true
    entity_category: config
    on_value:
      then:
        - lambda: |-
            if (x > 0.0f &&
                fabsf(x - id(xy6509_last_oah_ah)) > 0.0005f) {
              id(xy6509_last_oah_ah) = x;
            }

  # OWH-OPH: maximale Energie, Register 0x005A/0x005B,
  # Low-Word zuerst, Rohwert in 10 mWh. 0 = Schutz aus.
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_owh
    name: "Alarmgrenze Energie (OWH-OPH)"
    address: 0x005A
    value_type: U_DWORD_R
    unit_of_measurement: "Wh"
    icon: "mdi:lightning-bolt-circle"
    mode: box
    min_value: 0.00
    max_value: 4200000.00
    step: 0.01
    multiply: 100
    use_write_multiple: true
    entity_category: config
    on_value:
      then:
        - lambda: |-
            if (x > 0.0f &&
                fabsf(x - id(xy6509_last_owh_wh)) > 0.005f) {
              id(xy6509_last_owh_wh) = x;
            }

  # OTP: interne Uebertemperatur, Register 0x005C, ganzzahlig in Grad C
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_otp
    name: "Alarmgrenze interne Temperatur (OTP)"
    address: 0x005C
    value_type: U_WORD
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-alert"
    mode: box
    min_value: 0
    max_value: 110
    step: 1
    multiply: 1
    entity_category: config

  # ETP: externe Uebertemperatur, Register 0x005E. 0 = Schutz aus.
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_alarm_etp
    name: "Alarmgrenze externe Temperatur (ETP)"
    address: 0x005E
    value_type: U_WORD
    unit_of_measurement: "°C"
    icon: "mdi:thermometer-probe"
    mode: box
    min_value: 0
    max_value: 110
    step: 1
    multiply: 1
    entity_category: config
    on_value:
      then:
        - lambda: |-
            if (x > 0.0f &&
                fabsf(x - id(xy6509_last_etp_c)) > 0.5f) {
              id(xy6509_last_etp_c) = x;
            }

# ---------------------------------------------------------------------------
# Schalter
# ---------------------------------------------------------------------------

switch:
  # Ausgang ein/aus, Register 0x0012
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_output_enabled
    name: "Ausgang"
    register_type: holding
    address: 0x0012
    bitmask: 0x0001
    restore_mode: DISABLED
    icon: "mdi:power"

  # Ausgang nach dem Einschalten automatisch aktivieren, Register 0x005D
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_power_on_output
    name: "Ausgang nach Gerätestart"
    register_type: holding
    address: 0x005D
    bitmask: 0x0001
    restore_mode: DISABLED
    entity_category: config
    icon: "mdi:power-cycle"

  # OAH: Das Geraet bildet AUS durch Grenzwert 0 ab.
  - platform: template
    id: xy6509_alarm_oah_enabled
    name: "Kapazitätsalarm (OAH) aktiv"
    icon: "mdi:battery-alert"
    entity_category: config
    restore_mode: DISABLED
    lambda: |-
      if (isnan(id(xy6509_alarm_oah).state)) {
        return {};
      }
      return id(xy6509_alarm_oah).state > 0.0f;
    turn_on_action:
      - number.set:
          id: xy6509_alarm_oah
          value: !lambda |-
            return id(xy6509_last_oah_ah) > 0.0f
                ? id(xy6509_last_oah_ah)
                : 2.0f;
    turn_off_action:
      - lambda: |-
          if (!isnan(id(xy6509_alarm_oah).state) &&
              id(xy6509_alarm_oah).state > 0.0f) {
            id(xy6509_last_oah_ah) = id(xy6509_alarm_oah).state;
          }
      - number.set:
          id: xy6509_alarm_oah
          value: 0

  # OWH-OPH: Das Geraet bildet AUS durch Grenzwert 0 ab.
  - platform: template
    id: xy6509_alarm_owh_enabled
    name: "Energiealarm (OWH-OPH) aktiv"
    icon: "mdi:lightning-bolt-circle"
    entity_category: config
    restore_mode: DISABLED
    lambda: |-
      if (isnan(id(xy6509_alarm_owh).state)) {
        return {};
      }
      return id(xy6509_alarm_owh).state > 0.0f;
    turn_on_action:
      - number.set:
          id: xy6509_alarm_owh
          value: !lambda |-
            return id(xy6509_last_owh_wh) > 0.0f
                ? id(xy6509_last_owh_wh)
                : 500.0f;
    turn_off_action:
      - lambda: |-
          if (!isnan(id(xy6509_alarm_owh).state) &&
              id(xy6509_alarm_owh).state > 0.0f) {
            id(xy6509_last_owh_wh) = id(xy6509_alarm_owh).state;
          }
      - number.set:
          id: xy6509_alarm_owh
          value: 0

  # OHP: AUS = 00:00, EIN = letzter Grenzwert.
  - platform: template
    id: xy6509_alarm_ohp_enabled
    name: "Laufzeitalarm (OHP) aktiv"
    icon: "mdi:timer-alert"
    entity_category: config
    restore_mode: DISABLED
    lambda: |-
      if (isnan(id(xy6509_alarm_ohp_hours_raw).state) ||
          isnan(id(xy6509_alarm_ohp_minutes_raw).state)) {
        return {};
      }

      return id(xy6509_alarm_ohp_hours_raw).state > 0.0f ||
          id(xy6509_alarm_ohp_minutes_raw).state > 0.0f;
    turn_on_action:
      - number.set:
          id: xy6509_alarm_ohp
          value: !lambda |-
            return id(xy6509_last_ohp_minutes) > 0.0f
                ? id(xy6509_last_ohp_minutes)
                : 150.0f;
    turn_off_action:
      - lambda: |-
          if (!isnan(id(xy6509_alarm_ohp).state) &&
              id(xy6509_alarm_ohp).state > 0.0f) {
            id(xy6509_last_ohp_minutes) = id(xy6509_alarm_ohp).state;
          }
      - number.set:
          id: xy6509_alarm_ohp
          value: 0

  # ETP: AUS = 0 Grad C, EIN = letzter Grenzwert.
  - platform: template
    id: xy6509_alarm_etp_enabled
    name: "Externer Temperaturalarm (ETP) aktiv"
    icon: "mdi:thermometer-probe-off"
    entity_category: config
    restore_mode: DISABLED
    lambda: |-
      if (isnan(id(xy6509_alarm_etp).state)) {
        return {};
      }
      return id(xy6509_alarm_etp).state > 0.0f;
    turn_on_action:
      - number.set:
          id: xy6509_alarm_etp
          value: !lambda |-
            return id(xy6509_last_etp_c) > 0.0f
                ? id(xy6509_last_etp_c)
                : 60.0f;
    turn_off_action:
      - lambda: |-
          if (!isnan(id(xy6509_alarm_etp).state) &&
              id(xy6509_alarm_etp).state > 0.0f) {
            id(xy6509_last_etp_c) = id(xy6509_alarm_etp).state;
          }
      - number.set:
          id: xy6509_alarm_etp
          value: 0

# ---------------------------------------------------------------------------
# Aktionen
# ---------------------------------------------------------------------------

button:
  # Aktiven Schutzalarm quittieren. Der Ausgang wird zuerst ausgeschaltet,
  # danach wird 0 in das R/W-Schutzregister 0x0010 geschrieben.
  # Der Ausgang bleibt aus und muss nach Behebung der Ursache bewusst
  # wieder eingeschaltet werden.
  - platform: template
    id: xy6509_reset_alarm
    name: "Alarm quittieren"
    icon: "mdi:shield-refresh"
    entity_category: config
    on_press:
      then:
        - switch.turn_off: xy6509_output_enabled
        - delay: 200ms
        - number.set:
            id: xy6509_protection_code
            value: 0

  # Die aktuell eingestellten Werte (Sollspannung, Strombegrenzung und alle
  # Schutzgrenzen) in den gewaehlten Preset-Speicher M0-M9 schreiben.
  # Der XY-6509 legt jede Gruppe als 15 aufeinanderfolgende Register ab
  # Basis 0x0050 + Mx*0x10 ab (Modbus-Referenz, Note 2). Es gibt keinen
  # Sammel-Speicherbefehl; der Block wird direkt per Write-Multiple (0x10)
  # geschrieben - Faktoren und DWORD-Reihenfolge identisch zu den number-
  # Entities oben (OAH/OWH sind U_DWORD_R, also Low-Word zuerst).
  - platform: template
    id: xy6509_preset_save
    name: "Aktuelle Werte als Preset speichern"
    icon: "mdi:content-save"
    entity_category: config
    on_press:
      then:
        - lambda: |-
            const auto idx = id(xy6509_preset_save_target).active_index();
            if (!idx.has_value()) {
              ESP_LOGW("preset", "Kein Speicherziel gewaehlt");
              return;
            }
            const uint16_t slot = static_cast<uint16_t>(idx.value());  // 0..9
            const uint16_t base = 0x0050 + slot * 0x0010;

            // Aktuelle Werte in realen Einheiten einsammeln.
            const float v_set = id(xy6509_set_voltage).state;
            const float i_set = id(xy6509_set_current).state;
            const float lvp   = id(xy6509_alarm_lvp).state;
            const float ovp   = id(xy6509_alarm_ovp).state;
            const float ocp   = id(xy6509_alarm_ocp).state;
            const float opp   = id(xy6509_alarm_opp).state;
            const float ohp_h = id(xy6509_alarm_ohp_hours_raw).state;
            const float ohp_m = id(xy6509_alarm_ohp_minutes_raw).state;
            const float oah   = id(xy6509_alarm_oah).state;
            const float owh   = id(xy6509_alarm_owh).state;
            const float otp   = id(xy6509_alarm_otp).state;
            const float etp   = id(xy6509_alarm_etp).state;

            if (isnan(v_set) || isnan(i_set) || isnan(lvp) || isnan(ovp) ||
                isnan(ocp) || isnan(opp) || isnan(ohp_h) || isnan(ohp_m) ||
                isnan(oah) || isnan(owh) || isnan(otp) || isnan(etp)) {
              ESP_LOGW("preset",
                       "Speichern abgebrochen: noch nicht alle Werte gelesen");
              return;
            }

            // In Rohwerte umrechnen (gleiche Faktoren wie die number-Entities).
            const uint32_t oah_raw =
                static_cast<uint32_t>(lroundf(oah * 1000.0f));  // Ah -> mAh
            const uint32_t owh_raw =
                static_cast<uint32_t>(lroundf(owh * 100.0f));   // Wh -> 10 mWh

            const std::vector<uint16_t> values = {
              static_cast<uint16_t>(lroundf(v_set * 100.0f)),   // +0x00 V-SET
              static_cast<uint16_t>(lroundf(i_set * 1000.0f)),  // +0x01 I-SET
              static_cast<uint16_t>(lroundf(lvp   * 100.0f)),   // +0x02 S-LVP
              static_cast<uint16_t>(lroundf(ovp   * 100.0f)),   // +0x03 S-OVP
              static_cast<uint16_t>(lroundf(ocp   * 1000.0f)),  // +0x04 S-OCP
              static_cast<uint16_t>(lroundf(opp   * 10.0f)),    // +0x05 S-OPP
              static_cast<uint16_t>(lroundf(ohp_h)),            // +0x06 S-OHP_H
              static_cast<uint16_t>(lroundf(ohp_m)),            // +0x07 S-OHP_M
              static_cast<uint16_t>(oah_raw & 0xFFFF),          // +0x08 S-OAH_L
              static_cast<uint16_t>(oah_raw >> 16),             // +0x09 S-OAH_H
              static_cast<uint16_t>(owh_raw & 0xFFFF),          // +0x0A S-OWH_L
              static_cast<uint16_t>(owh_raw >> 16),             // +0x0B S-OWH_H
              static_cast<uint16_t>(lroundf(otp)),              // +0x0C S-OTP
              static_cast<uint16_t>(id(xy6509_power_on_output).state ? 1 : 0),  // +0x0D S-INI
              static_cast<uint16_t>(lroundf(etp)),              // +0x0E S-ETP
            };

            auto cmd = esphome::modbus_controller::ModbusCommandItem::
                create_write_multiple_command(
                    id(xy6509), base,
                    static_cast<uint16_t>(values.size()), values);
            id(xy6509)->queue_command(cmd);

            ESP_LOGI("preset", "Preset M%u gespeichert (Basis 0x%04X, %u Register)",
                     slot, base, static_cast<unsigned>(values.size()));

# ---------------------------------------------------------------------------
# Presets: laden und speichern
# ---------------------------------------------------------------------------

select:
