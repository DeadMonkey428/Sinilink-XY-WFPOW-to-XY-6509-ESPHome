    address: 0x0006
    register_type: holding
    value_type: U_DWORD_R
    unit_of_measurement: "Ah"
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_output_energy
    name: "Ausgangsenergie"
    address: 0x0008
    register_type: holding
    value_type: U_DWORD_R
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_runtime_hours
    address: 0x000A
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_runtime_minutes
    address: 0x000B
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_runtime_seconds
    address: 0x000C
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: template
    id: xy6509_runtime
    name: "Ausgang Laufzeit"
    unit_of_measurement: "h"
    device_class: duration
    state_class: total_increasing
    accuracy_decimals: 3
    update_interval: 1s
    lambda: |-
      if (isnan(id(xy6509_runtime_hours).state) ||
          isnan(id(xy6509_runtime_minutes).state) ||
          isnan(id(xy6509_runtime_seconds).state)) {
        return NAN;
      }

      return id(xy6509_runtime_hours).state
          + id(xy6509_runtime_minutes).state / 60.0f
          + id(xy6509_runtime_seconds).state / 3600.0f;

