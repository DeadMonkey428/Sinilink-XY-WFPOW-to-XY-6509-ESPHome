    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1


  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_model
    name: "Modellnummer"
    address: 0x0016
    register_type: holding
    value_type: U_WORD
    entity_category: diagnostic
    skip_updates: 59

  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_firmware_version
    name: "Firmwareversion"
    address: 0x0017
    register_type: holding
    value_type: U_WORD
    entity_category: diagnostic
    skip_updates: 59

# ---------------------------------------------------------------------------
# Statuswerte
# ---------------------------------------------------------------------------

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_key_lock
    name: "Tastensperre"
    address: 0x000F
    register_type: holding
    bitmask: 0x0001
    icon: "mdi:lock"

  - platform: modbus_controller
    modbus_controller_id: xy6509
    id: xy6509_constant_current_active
    name: "Konstantstrom aktiv"
    address: 0x0011
    register_type: holding
    bitmask: 0x0001
    icon: "mdi:current-dc"

  - platform: template
    id: xy6509_alarm_active
    name: "Schutzabschaltung aktiv"
    device_class: problem
    lambda: |-
      if (isnan(id(xy6509_protection_code).state)) {
        return {};
      }
      return static_cast<int>(id(xy6509_protection_code).state) != 0;

# ---------------------------------------------------------------------------
# Alarmstatus als Klartext
# ---------------------------------------------------------------------------

text_sensor:
  - platform: template
    id: xy6509_protection_status
    name: "Schutzstatus"
    icon: "mdi:shield-alert"
    update_interval: 1s
    lambda: |-
      if (isnan(id(xy6509_protection_code).state)) {
        return std::string("Keine Daten");
      }

      const int code =
          static_cast<int>(id(xy6509_protection_code).state);

      switch (code) {
        case 0:
          return std::string("Normal");
        case 1:
          return std::string("OVP - Überspannung");
        case 2:
          return std::string("OCP - Überstrom");
        case 3:
          return std::string("OPP - Überleistung");
        case 4:
          return std::string("LVP - Unterspannung");
        case 5:
          return std::string("OAH - Kapazitätsgrenze");
        case 6:
          return std::string("OHP - Laufzeitgrenze");
        case 7:
          return std::string("OTP - Interne Übertemperatur");
        case 8:
          return std::string("OEP - Ausgangsfehler");
        case 9:
          return std::string("OWH - Energiegrenze");
        case 10:
          return std::string("ICP - Eingangsstrom");
        case 11:
          return std::string("ETP - Externe Übertemperatur");
        default:
          return std::string("Unbekannt: ") + std::to_string(code);
      }
